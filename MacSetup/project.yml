name: MacSetup
options:
  bundleIdPrefix: com.silo
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

targets:
  MacSetup:
    type: application
    platform: macOS
    sources:
      - Sources/MacSetup
    info:
      path: Sources/MacSetup/Info.plist
      properties:
        CFBundleName: MacSetup
        CFBundleDisplayName: MacSetup
        LSMinimumSystemVersion: "14.0"
        LSUIElement: false
        NSHighResolutionCapable: true
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.silo.MacSetup
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
